openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Sales & Orders API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: reports
    description: Revenue reporting
  - name: customers
    description: Customer management
  - name: products
    description: SKU/product catalog
  - name: orders
    description: Order management
  - name: users
    description: User and sales team administration
  - name: invoices
    description: Invoice documents
  - name: ar
    description: Accounts receivable
  - name: promotions
    description: Promotions

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── Reports ───────────────────────────────────────────────────────────────

  /reports/revenue/yoy:
    get:
      operationId: getYoyRevenue
      tags: [reports]
      summary: Year-over-year revenue summary
      parameters:
        - name: repId
          in: query
          schema:
            type: ["integer", "null"]
          description: Filter by sales rep ID (null = entire company)
      responses:
        "200":
          description: YoY revenue data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/YoyRevenueReport"

  /reports/revenue/mom:
    get:
      operationId: getMomRevenue
      tags: [reports]
      summary: Month-over-month revenue summary
      parameters:
        - name: repId
          in: query
          schema:
            type: ["integer", "null"]
          description: Filter by sales rep ID (null = entire company)
      responses:
        "200":
          description: MoM revenue data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MomRevenueReport"

  /reports/revenue/summary:
    get:
      operationId: getRevenueSummary
      tags: [reports]
      summary: Revenue summary for a date range
      parameters:
        - name: startDate
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: repId
          in: query
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: Revenue summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RevenueSummary"

  /reports/customers:
    get:
      operationId: getCustomerRevenueReport
      tags: [reports]
      summary: Customer revenue table for a date range
      parameters:
        - name: startDate
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: compareStartDate
          in: query
          schema:
            type: string
            format: date
        - name: compareEndDate
          in: query
          schema:
            type: string
            format: date
        - name: repId
          in: query
          schema:
            type: ["integer", "null"]
        - name: productId
          in: query
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: Customer revenue rows
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CustomerRevenueRow"

  /reports/customer-detail:
    get:
      operationId: getCustomerRevenueDetail
      tags: [reports]
      summary: Product-level revenue breakdown for a customer
      parameters:
        - name: customerId
          in: query
          required: true
          schema:
            type: integer
        - name: startDate
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: compareStartDate
          in: query
          schema:
            type: string
            format: date
        - name: compareEndDate
          in: query
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Customer product breakdown
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerRevenueDetail"

  # ── Users & Sales Reps ────────────────────────────────────────────────────

  /users/me:
    get:
      operationId: getCurrentUser
      tags: [users]
      summary: Get the current application user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users:
    get:
      operationId: getUsers
      tags: [users]
      summary: List users (admin only)
      responses:
        "200":
          description: User directory
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
    post:
      operationId: createUser
      tags: [users]
      summary: Create a sales rep user (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserInput"
      responses:
        "201":
          description: Created user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/{id}:
    patch:
      operationId: updateUser
      tags: [users]
      summary: Update a user (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserInput"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /reps:
    get:
      operationId: getSalesReps
      tags: [reports]
      summary: List all sales representatives
      responses:
        "200":
          description: Sales reps list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SalesRep"

  # ── Customers ─────────────────────────────────────────────────────────────

  /customers:
    get:
      operationId: getCustomers
      tags: [customers]
      summary: Search customers
      parameters:
        - name: q
          in: query
          schema:
            type: string
        - name: repId
          in: query
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: Customer list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Customer"

  /customers/{id}:
    get:
      operationId: getCustomer
      tags: [customers]
      summary: Get customer detail including AR balance
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Customer detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerDetail"

  # ── Products ──────────────────────────────────────────────────────────────

  /products:
    get:
      operationId: getProducts
      tags: [products]
      summary: Browse/search product catalog
      parameters:
        - name: q
          in: query
          schema:
            type: string
        - name: inStock
          in: query
          schema:
            type: ["boolean", "null"]
        - name: customerId
          in: query
          schema:
            type: ["integer", "null"]
          description: When set, sorts frequent items for this customer first
      responses:
        "200":
          description: Product list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"

  /products/{id}:
    get:
      operationId: getProduct
      tags: [products]
      summary: Get product detail
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Product detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductDetail"
    patch:
      operationId: updateProduct
      tags: [products]
      summary: Update catalog product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductUpdate"
      responses:
        "200":
          description: Updated product detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductDetail"

  /products/{id}/sales:
    get:
      operationId: getProductSales
      tags: [products]
      summary: Product sales summary for a date range
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: startDate
          in: query
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Product sales summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductSalesSummary"

  # ── Orders ────────────────────────────────────────────────────────────────

  /orders:
    get:
      operationId: getOrders
      tags: [orders]
      summary: List orders
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [open, in_transit, fulfilled, cancelled]
        - name: customerId
          in: query
          schema:
            type: ["integer", "null"]
        - name: repId
          in: query
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: Orders list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"

    post:
      operationId: createOrder
      tags: [orders]
      summary: Submit a new order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderInput"
      responses:
        "201":
          description: Created order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /orders/{id}:
    get:
      operationId: getOrder
      tags: [orders]
      summary: Get order detail
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Order detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderDetail"

    patch:
      operationId: updateOrder
      tags: [orders]
      summary: Update order (edit before fulfilment)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderUpdate"
      responses:
        "200":
          description: Updated order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /invoices/{id}:
    get:
      operationId: getInvoice
      tags: [invoices]
      summary: Get invoice detail
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Invoice detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvoiceDetail"

    delete:
      operationId: cancelOrder
      tags: [orders]
      summary: Cancel an order (only if not shipped)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  # ── AR / Aging ────────────────────────────────────────────────────────────

  /ar/aging:
    get:
      operationId: getArAging
      tags: [ar]
      summary: Full AR aging report
      parameters:
        - name: customerId
          in: query
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: AR aging rows
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ArAgingRow"

  /ar/balance/{customerId}:
    get:
      operationId: getCustomerArBalance
      tags: [ar]
      summary: AR balance and credit status for a customer
      parameters:
        - name: customerId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: AR balance
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArBalance"

  # ── Promotions ────────────────────────────────────────────────────────────

  /promotions/active:
    get:
      operationId: getActivePromotions
      tags: [promotions]
      summary: Currently active promotions
      responses:
        "200":
          description: Active promotions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Promotion"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    # ── Reports ─────────────────────────────────────────────────────────────

    YoyMonthlyPoint:
      type: object
      required: [monthNum, thisYear, lastYear]
      properties:
        monthNum:
          type: integer
          description: "1-12"
        thisYear:
          type: number
        lastYear:
          type: number

    YoyRevenueReport:
      type: object
      required:
        [
          totalRevenue,
          previousYearRevenue,
          percentChange,
          pacedRevenue,
          currentYear,
          previousYear,
          monthlyPoints,
        ]
      properties:
        totalRevenue:
          type: number
        previousYearRevenue:
          type: number
        percentChange:
          type: number
        pacedRevenue:
          type: number
          description: Full-year revenue projection at the current run rate
        currentYear:
          type: integer
        previousYear:
          type: integer
        monthlyPoints:
          type: array
          items:
            $ref: "#/components/schemas/YoyMonthlyPoint"

    MomDailyPoint:
      type: object
      required: [day, thisMonth, lastMonth]
      properties:
        day:
          type: integer
          description: "Day of month 1-31"
        thisMonth:
          type: number
        lastMonth:
          type: number

    MomRevenueReport:
      type: object
      required:
        [
          currentMonthRevenue,
          previousMonthRevenue,
          percentChange,
          pacedRevenue,
          currentYearMonth,
          previousYearMonth,
          dailyPoints,
        ]
      properties:
        currentMonthRevenue:
          type: number
        previousMonthRevenue:
          type: number
        percentChange:
          type: number
        pacedRevenue:
          type: number
          description: Full-month revenue projection at the current daily run rate
        currentYearMonth:
          type: string
          description: "e.g. June 2026"
        previousYearMonth:
          type: string
          description: "e.g. May 2026"
        dailyPoints:
          type: array
          items:
            $ref: "#/components/schemas/MomDailyPoint"

    RevenueSummary:
      type: object
      required:
        [totalRevenue, previousPeriodRevenue, percentChange, customerCount]
      properties:
        totalRevenue:
          type: number
        previousPeriodRevenue:
          type: number
        percentChange:
          type: number
        customerCount:
          type: integer

    CustomerRevenueRow:
      type: object
      required:
        [
          customerId,
          customerName,
          totalRevenue,
          previousRevenue,
          percentChange,
          productCount,
        ]
      properties:
        customerId:
          type: integer
        customerName:
          type: string
        totalRevenue:
          type: number
        previousRevenue:
          type: number
        percentChange:
          type: number
        productCount:
          type: integer
        repName:
          type: ["string", "null"]

    ProductRevenueRow:
      type: object
      required:
        [
          productId,
          productName,
          revenue,
          previousRevenue,
          percentChange,
          unitsSold,
          previousUnitsSold,
        ]
      properties:
        productId:
          type: integer
        productName:
          type: string
        sku:
          type: string
        revenue:
          type: number
        previousRevenue:
          type: number
        percentChange:
          type: number
        unitsSold:
          type: integer
        previousUnitsSold:
          type: integer

    CustomerRevenueDetail:
      type: object
      required:
        [
          customerId,
          customerName,
          totalRevenue,
          previousRevenue,
          percentChange,
          products,
        ]
      properties:
        customerId:
          type: integer
        customerName:
          type: string
        totalRevenue:
          type: number
        previousRevenue:
          type: number
        percentChange:
          type: number
        products:
          type: array
          items:
            $ref: "#/components/schemas/ProductRevenueRow"

    SalesRep:
      type: object
      required: [id, name]
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: ["string", "null"]

    User:
      type: object
      required: [id, name, email, title, role, status, createdAt, updatedAt]
      properties:
        id:
          type: integer
        salesRepId:
          type: ["integer", "null"]
        name:
          type: string
        email:
          type: string
          format: email
        phone:
          type: ["string", "null"]
        title:
          type: string
        role:
          type: string
          enum: [admin, sales_rep]
        status:
          type: string
          enum: [active, inactive]
        lastActiveAt:
          type: ["string", "null"]
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    UserInput:
      type: object
      required: [name, email, title, status]
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        phone:
          type: ["string", "null"]
        title:
          type: string
        status:
          type: string
          enum: [active, inactive]

    # ── Customers ────────────────────────────────────────────────────────────

    Customer:
      type: object
      required: [id, name]
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        repId:
          type: ["integer", "null"]
        repName:
          type: ["string", "null"]

    CustomerDetail:
      type: object
      required:
        [id, name, arBalance, creditLimit, availableCredit, isPastDue, invoices]
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        address:
          type: ["string", "null"]
        repId:
          type: ["integer", "null"]
        repName:
          type: ["string", "null"]
        arBalance:
          type: number
          description: Current outstanding balance
        creditLimit:
          type: number
        availableCredit:
          type: number
        isPastDue:
          type: boolean
        customTerms:
          type: ["string", "null"]
        invoices:
          type: array
          items:
            $ref: "#/components/schemas/InvoiceSummary"

    InvoiceSummary:
      type: object
      required:
        [
          id,
          invoiceNumber,
          amount,
          amountPaid,
          balanceDue,
          invoiceDate,
          dueDate,
          isPaid,
        ]
      properties:
        id:
          type: integer
        invoiceNumber:
          type: string
        amount:
          type: number
        amountPaid:
          type: number
        balanceDue:
          type: number
        invoiceDate:
          type: string
          format: date
        dueDate:
          type: string
          format: date
        isPaid:
          type: boolean
        notes:
          type: ["string", "null"]
        orderId:
          type: ["integer", "null"]

    InvoiceParty:
      type: object
      required: [name, email, phone]
      properties:
        id:
          type: ["integer", "null"]
        name:
          type: string
        email:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        address:
          type: ["string", "null"]
        repName:
          type: ["string", "null"]

    InvoiceOrder:
      type: object
      required:
        [
          id,
          orderNumber,
          orderDate,
          subtotal,
          discountTotal,
          shippingCost,
          total,
        ]
      properties:
        id:
          type: integer
        orderNumber:
          type: string
        orderDate:
          type: string
          format: date-time
        shippingMethod:
          type: ["string", "null"]
        trackingNumber:
          type: ["string", "null"]
        subtotal:
          type: number
        discountTotal:
          type: number
        shippingCost:
          type: number
        total:
          type: number
        customTerms:
          type: ["string", "null"]

    InvoiceDetail:
      allOf:
        - $ref: "#/components/schemas/InvoiceSummary"
        - type: object
          required: [customer, company, order, lineItems]
          properties:
            customer:
              $ref: "#/components/schemas/InvoiceParty"
            company:
              $ref: "#/components/schemas/InvoiceParty"
            order:
              oneOf:
                - $ref: "#/components/schemas/InvoiceOrder"
                - type: "null"
            lineItems:
              type: array
              items:
                $ref: "#/components/schemas/OrderLineItem"

    # ── Products ──────────────────────────────────────────────────────────────

    Product:
      type: object
      required: [id, sku, name, unitPrice, inventoryQty, inStock]
      properties:
        id:
          type: integer
        sku:
          type: string
        name:
          type: string
        unitPrice:
          type: number
        inventoryQty:
          type: integer
        inStock:
          type: boolean
        etaDate:
          type: ["string", "null"]
          format: date
        imageUrl:
          type: ["string", "null"]
        packSize:
          type: ["string", "null"]
        orderFrequency:
          type: ["integer", "null"]
          description: How often this customer orders this product

    ProductDetail:
      type: object
      required: [id, sku, name, unitPrice, inventoryQty, inStock]
      properties:
        id:
          type: integer
        sku:
          type: string
        name:
          type: string
        description:
          type: ["string", "null"]
        unitPrice:
          type: number
        inventoryQty:
          type: integer
        inStock:
          type: boolean
        etaDate:
          type: ["string", "null"]
          format: date
        imageUrl:
          type: ["string", "null"]
        packSize:
          type: ["string", "null"]
        certifications:
          type: array
          items:
            type: string
        brochureUrl:
          type: ["string", "null"]
        infoSheetUrl:
          type: ["string", "null"]
        activePromotion:
          nullable: true
          oneOf:
            - $ref: "#/components/schemas/Promotion"
            - type: "null"

    ProductUpdate:
      type: object
      properties:
        sku:
          type: string
        name:
          type: string
        description:
          type: ["string", "null"]
        unitPrice:
          type: number
        inventoryQty:
          type: integer
        etaDate:
          type: ["string", "null"]
          format: date
        imageUrl:
          type: ["string", "null"]
        packSize:
          type: ["string", "null"]
        certifications:
          type: array
          items:
            type: string
        brochureUrl:
          type: ["string", "null"]
        infoSheetUrl:
          type: ["string", "null"]

    ProductSalesSummary:
      type: object
      required: [productId, startDate, endDate, unitsSold, orderCount, revenue]
      properties:
        productId:
          type: integer
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        unitsSold:
          type: integer
        orderCount:
          type: integer
        revenue:
          type: number

    # ── Orders ────────────────────────────────────────────────────────────────

    OrderLineItem:
      type: object
      required: [productId, sku, productName, quantity, unitPrice, lineTotal]
      properties:
        productId:
          type: integer
        sku:
          type: string
        productName:
          type: string
        quantity:
          type: integer
        unitPrice:
          type: number
        discountAmount:
          type: number
        lineTotal:
          type: number
        promotionName:
          type: ["string", "null"]

    OrderLineInput:
      type: object
      required: [productId, quantity]
      properties:
        productId:
          type: integer
        quantity:
          type: integer
        excludePromotion:
          type: boolean

